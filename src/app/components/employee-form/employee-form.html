<div class="form-page">

  <div class="form-container">

    <div class="form-header">

      <div>
        <h1>
          {{
            isEditMode
              ? 'Edit Employee'
              : 'Add Employee'
          }}
        </h1>

        <p>
          {{
            isEditMode
              ? 'Update employee information.'
              : 'Create a new employee record.'
          }}
        </p>
      </div>

      <button
        class="back-button"
        type="button"
        (click)="cancel()"
      >
        Back
      </button>

    </div>

    <div
      *ngIf="loading"
      class="message"
    >
      Loading employee details...
    </div>

    <div
      *ngIf="errorMessage"
      class="error-message"
    >
      {{ errorMessage }}
    </div>

    <div
      *ngIf="successMessage"
      class="success-message"
    >
      {{ successMessage }}
    </div>

    <form
      *ngIf="!loading"
      (ngSubmit)="saveEmployee()"
    >

      <div class="form-grid">

        <div class="form-group">

          <label for="employeeCode">
            Employee Code *
          </label>

          <input
            id="employeeCode"
            type="text"
            name="employeeCode"
            [(ngModel)]="form.employeeCode"
            [readonly]="isEditMode"
            placeholder="Example: EMP003"
            required
          />

        </div>

        <div class="form-group">

          <label for="firstName">
            First Name *
          </label>

          <input
            id="firstName"
            type="text"
            name="firstName"
            [(ngModel)]="form.firstName"
            placeholder="Enter first name"
            required
          />

        </div>

        <div class="form-group">

          <label for="lastName">
            Last Name *
          </label>

          <input
            id="lastName"
            type="text"
            name="lastName"
            [(ngModel)]="form.lastName"
            placeholder="Enter last name"
            required
          />

        </div>

        <div class="form-group">

          <label for="nic">
            NIC *
          </label>

          <input
            id="nic"
            type="text"
            name="nic"
            [(ngModel)]="form.nic"
            placeholder="Enter NIC"
            required
          />

        </div>

        <div class="form-group">

          <label for="mobileNo">
            Mobile Number *
          </label>

          <input
            id="mobileNo"
            type="text"
            name="mobileNo"
            [(ngModel)]="form.mobileNo"
            placeholder="0771234567"
            maxlength="10"
            required
          />

        </div>

        <div class="form-group">

          <label for="email">
            Email *
          </label>

          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="form.email"
            placeholder="employee@example.com"
            required
          />

        </div>

        <div class="form-group">

          <label>
            Gender *
          </label>

          <div class="radio-group">

            <label class="radio-option">

              <input
                type="radio"
                name="gender"
                value="Male"
                [(ngModel)]="form.gender"
                [disabled]="isEditMode"
                required
              />

              <span>
                Male
              </span>

            </label>

            <label class="radio-option">

              <input
                type="radio"
                name="gender"
                value="Female"
                [(ngModel)]="form.gender"
                [disabled]="isEditMode"
                required
              />

              <span>
                Female
              </span>

            </label>

          </div>

        </div>

        <div class="form-group">

          <label for="dateOfBirth">
            Date of Birth *
          </label>

          <input
            id="dateOfBirth"
            type="date"
            name="dateOfBirth"
            [(ngModel)]="form.dateOfBirth"
            [readonly]="isEditMode"
            required
          />

        </div>

        <div class="form-group">

          <label for="designationId">
            Designation *
          </label>

          <select
            id="designationId"
            name="designationId"
            [(ngModel)]="form.designationId"
            required
          >

            <option
              [ngValue]="0"
              disabled
            >
              Select Designation
            </option>

            <option
              *ngFor="let designation of designations"
              [ngValue]="designation.designationId"
            >
              {{ designation.designationName }}
            </option>

          </select>

        </div>

        <div class="form-group">

          <label for="status">
            Status *
          </label>

          <select
            id="status"
            name="status"
            [(ngModel)]="form.status"
            required
          >

            <option value="ACTIVE">
              Active
            </option>

            <option value="INACTIVE">
              Inactive
            </option>

          </select>

        </div>

        <div class="form-group full-width">

          <label for="address">
            Address *
          </label>

          <textarea
            id="address"
            name="address"
            rows="3"
            [(ngModel)]="form.address"
            placeholder="Enter employee address"
            required
          ></textarea>

        </div>

        <div class="form-group full-width">

          <label for="profileImage">
            Profile Image
          </label>

          <input
            id="profileImage"
            type="file"
            accept=".jpg,.jpeg,.png,image/jpeg,image/png"
            (change)="onFileSelected($event)"
          />

          <small>
            JPG or PNG, maximum 5MB.
          </small>

        </div>

      </div>

      <div class="form-actions">

        <button
          class="cancel-button"
          type="button"
          (click)="cancel()"
        >
          Cancel
        </button>

        <button
          class="save-button"
          type="submit"
          [disabled]="saving"
        >
          {{
            saving
              ? 'Saving...'
              : (
                isEditMode
                  ? 'Update Employee'
                  : 'Create Employee'
              )
          }}
        </button>

      </div>

    </form>

  </div>

</div>
